<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="navbar.css">
    <link rel="stylesheet" href="IndexProjectDisplay.css">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>

    <script defer type="text/javascript" src="ProjectLibrary.js"></script>
    <script defer type="text/javascript" src="index.js"></script>
</head>
<body>
    <div id="NavBar" class="NavBarFlexContainer">
        <button class="FillButton NavBarItemLeft" title="To Profile Page">
            <img src="IndexImages/ProfileTestImage.png"  class="FillArea">
        </button>

        <button class="FillButton NavBarItemLeft" title="To Home Page">
            <img src="IndexImages/HouseImage.png"  class="FillArea">
        </button>

        <strong class="FillHeight PortfolioTitle NavBarItemCenter ">Sage's Portfolio</strong>

        <button class="FillButton NavBarItemRight" title="Search For Projects">
            <img src="IndexImages/SearchForImage.png"  class="FillArea">
        </button>
    </div>

    <!--Project Category List-->
    <div class="" id="ProjectListListID">

        <!--Project Catagory-->
        <p class="ProjectCatagoryNameDisplay">
            Project Catagory
        </p>

        <!--Project Catagory List-->
        <div class="ProjectListFlexRowContainer ProjectCatagoryListDisplay">

            <!--Project Element-->
            <!--Links ot the project summary page-->
            <a class="ProjectFlexColumnContainer ProjectListFlexRowItem ProjectDisplayWrapper" href="Static Website Projects/Recipe Project/index.html"
                title="Go To {Project Title}">
                <!--Image Wrapper-->
                <div class="ProjectFlexColumnItemElement ProjectImageWrapper ProjectListFlexRowContainer">
                    <div class="ProjectListFlexRowItem ProjectImageWrapperLeft"></div>
                    <img src="ProjectLibraryImages/LegoTestSite.png" class="ProjectImage ProjectListFlexRowItem">
                    <div class="ProjectListFlexRowItem ProjectImageWrapperRight"></div>
                </div>
                
                <!--Project Title-->
                <p class="ProjectFlexColumnItemElement ProjectTitleElement">
                    Project Title
                </p>

                <!--Project Summary-->
                <p class="ProjectFlexColumnItemElement ProjectSummaryElement">
                    Project Summary Of Stuff
                </p>
            </a>

            <!--To Catagory Search-->
            <button>
                <img src="IndexImages/SearchForImage.png" title="To Catagory Search">
            </button>


        </div>


        
    </div>



</body>
</html>
